<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/adminAgrofrutos/logo.png" />
    <link rel="apple-touch-icon" href="/adminAgrofrutos/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Agrofrutos" />
    <title>Agrofrutos</title>
  </head>
  <body>
    <!--
      Lee el path codificado por public/404.html (ruta SPA cuando el usuario
      recarga un deep-link en GitHub Pages) y lo reescribe via history para
      que react-router-dom resuelva la pantalla real sin un round-trip extra.
    -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) { return s.replace(/~and~/g, "&"); })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
